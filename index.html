<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root { --prime-red: #E50914; --dark-bg: #050505; --card-bg: #111111; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; }
        .glass-card { background: var(--card-bg); border: 1px solid #222; border-radius: 12px; }
        .btn-date { padding: 8px 16px; border-radius: 6px; font-size: 11px; font-weight: 800; text-transform: uppercase; border: 1px solid #333; transition: 0.3s; }
        .btn-date.active { background: var(--prime-red); border-color: var(--prime-red); }
        input[type="date"] { background: #111; border: 1px solid #333; color: white; padding: 5px; border-radius: 6px; font-size: 12px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-6">
            <div>
                <h1 class="text-3xl font-black uppercase tracking-tighter">PRIME <span class="text-[#E50914]">ADS HUB</span></h1>
                <p class="text-gray-500 text-[10px] font-bold tracking-[3px]">HISTORICAL PERFORMANCE DATA</p>
            </div>
            
            <div class="flex flex-wrap gap-3 items-center bg-[#0a0a0a] p-3 rounded-xl border border-[#222]">
                <button onclick="changeDateMode('today')" id="btn-today" class="btn-date active">Today</button>
                <button onclick="changeDateMode('yesterday')" id="btn-yesterday" class="btn-date">Yesterday</button>
                <div class="h-6 w-[1px] bg-gray-800"></div>
                <input type="date" id="customDate" onchange="changeDateMode('custom')">
                <select id="networkFilter" onchange="applyFilters()" class="bg-[#111] border border-[#333] text-white p-2 rounded-lg text-xs font-bold">
                    <option value="all">All Networks</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 text-center">
            <div class="glass-card p-6 border-b-2 border-gray-800">
                <p class="text-gray-500 text-[10px] font-bold uppercase">Impressions</p>
                <h2 class="text-2xl font-black mt-1" id="kpi-imps">0</h2>
            </div>
            <div class="glass-card p-6 border-b-2 border-[#E50914]">
                <p class="text-[#E50914] text-[10px] font-bold uppercase">Clicks</p>
                <h2 class="text-2xl font-black mt-1" id="kpi-clicks">0</h2>
            </div>
            <div class="glass-card p-6 border-b-2 border-gray-800">
                <p class="text-gray-500 text-[10px] font-bold uppercase">Avg CTR</p>
                <h2 class="text-2xl font-black mt-1" id="kpi-ctr">0.00%</h2>
            </div>
            <div class="glass-card p-6 border-b-2 border-gray-800">
                <p class="text-gray-500 text-[10px] font-bold uppercase">Viewable</p>
                <h2 class="text-2xl font-black mt-1" id="kpi-view">0</h2>
            </div>
        </div>

        <div class="glass-card overflow-hidden">
            <table class="w-full text-left text-xs">
                <thead class="bg-[#1a1a1a] text-gray-500 uppercase font-bold border-b border-[#222]">
                    <tr><th class="p-4">Line Item</th><th class="p-4">Country</th><th class="p-4">Imps</th><th class="p-4">Clicks</th><th class="p-4">CTR</th><th class="p-4">Viewable</th></tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-[#222]"></tbody>
            </table>
        </div>
    </div>

    <script>
        const DATA_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQV17KMJNGsSBUjBAEXS80WE_E4M3n3g1dY0MkwfTgbfQphWe2gZ_20FB0rBJgnZMz1XlVm4n-9JSqX/pub?gid=1552157413&single=true&output=csv';
        const NETWORKS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQV17KMJNGsSBUjBAEXS80WE_E4M3n3g1dY0MkwfTgbfQphWe2gZ_20FB0rBJgnZMz1XlVm4n-9JSqX/pub?gid=1570899718&single=true&output=csv';
        
        let rawData = [];
        let viewDate = new Date().toISOString().split('T')[0]; // Default to Today

        async function init() {
            // Load Network List
            const nRes = await fetch(NETWORKS_URL + '&cb=' + Date.now());
            const nText = await nRes.text();
            nText.split('\n').slice(1).forEach(id => {
                if(!id.trim()) return;
                let opt = document.createElement('option');
                opt.value = id.trim(); opt.innerText = "Network: " + id.trim();
                document.getElementById('networkFilter').appendChild(opt);
            });

            // Load Report Data
            const rRes = await fetch(DATA_URL + '&cb=' + Date.now());
            const rText = await rRes.text();
            rawData = rText.split('\n').slice(1).map(row => {
                const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                return { date: c[0], item: c[1], geo: c[2], imps: parseInt(c[3])||0, clicks: parseInt(c[4])||0, ctr: c[5], view: parseInt(c[6])||0, net: c[7]?.replace(/'/g, '') };
            }).filter(r => r.date);

            applyFilters();
        }

        function changeDateMode(mode) {
            document.querySelectorAll('.btn-date').forEach(b => b.classList.remove('active'));
            if(mode === 'today') {
                viewDate = new Date().toISOString().split('T')[0];
                document.getElementById('btn-today').classList.add('active');
            } else if (mode === 'yesterday') {
                const d = new Date(); d.setDate(d.getDate() - 1);
                viewDate = d.toISOString().split('T')[0];
                document.getElementById('btn-yesterday').classList.add('active');
            } else {
                viewDate = document.getElementById('customDate').value;
            }
            applyFilters();
        }

        function applyFilters() {
            const net = document.getElementById('networkFilter').value;
            const filtered = rawData.filter(r => r.date === viewDate && (net === 'all' || r.net == net));
            render(filtered);
        }

        function render(data) {
            let imps = 0, clks = 0, views = 0, html = "";
            data.forEach(r => {
                imps += r.imps; clks += r.clicks; views += r.view;
                html += `<tr><td class="p-4 font-bold">${r.item}</td><td class="p-4">${r.geo}</td><td class="p-4">${r.imps.toLocaleString()}</td><td class="p-4">${r.clicks.toLocaleString()}</td><td class="p-4 text-red-500 font-bold">${r.ctr}</td><td class="p-4">${r.view.toLocaleString()}</td></tr>`;
            });
            document.getElementById('kpi-imps').innerText = imps.toLocaleString();
            document.getElementById('kpi-clicks').innerText = clks.toLocaleString();
            document.getElementById('kpi-view').innerText = views.toLocaleString();
            document.getElementById('kpi-ctr').innerText = imps > 0 ? ((clks/imps)*100).toFixed(2) + '%' : '0.00%';
            document.getElementById('table-body').innerHTML = html || '<tr><td colspan="6" class="p-10 text-center text-gray-600 italic">No data found for this date.</td></tr>';
        }

        init();
    </script>
</body>
</html>
