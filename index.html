<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root { --prime-red: #E50914; --dark-bg: #050505; --card-bg: #111111; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; }
        #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .zoom-logo { width: 100px; animation: pulse 2s infinite alternate; border-radius: 50%; border: 2px solid var(--prime-red); }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.6; } 100% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 30px #E50914; } }
        .glass-card { background: var(--card-bg); border: 1px solid #222; border-radius: 12px; }
        .prime-table th { background: #1a1a1a; color: #888; text-transform: uppercase; font-size: 10px; padding: 15px; border-bottom: 2px solid #333; }
        .prime-table td { padding: 15px; border-bottom: 1px solid #222; font-size: 12px; color: #ccc; }
        select { background-color: #111; border: 1px solid #333; color: white; padding: 10px 15px; border-radius: 8px; font-weight: bold; outline: none; cursor: pointer; min-width: 220px; border-left: 4px solid var(--prime-red); }
    </style>
</head>
<body>

    <div id="loader">
        <img src="https://finance.afp.org.pk/wp-content/uploads/2026/03/download-16.jpg" class="zoom-logo">
        <p style="color:#E50914; margin-top:20px; font-size:10px; font-weight:800; letter-spacing:3px;">SYNCING DATA STREAMS...</p>
    </div>

    <div class="max-w-7xl mx-auto p-4 md:p-10 opacity-0" id="main-content" style="transition: opacity 1s;">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <img src="https://finance.afp.org.pk/wp-content/uploads/2026/03/download-16.jpg" class="w-14 h-14 rounded-full border-2 border-[#E50914]">
                <div>
                    <h1 class="text-2xl font-black uppercase leading-none">PRIME <span class="text-[#E50914]">ADS HUB</span></h1>
                    <p id="last-updated" class="text-[9px] text-gray-500 uppercase tracking-[4px] mt-1 font-bold">Network ID Selector Active</p>
                </div>
            </div>
            <div class="flex gap-4 items-center">
                <select id="networkFilter" onchange="applyFilters()">
                    <option value="all">View All Networks</option>
                </select>
                <button onclick="location.reload()" class="bg-[#222] text-white px-5 py-2 rounded-lg text-[10px] font-bold uppercase hover:bg-red-700 transition">Refresh</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 text-center">
            <div class="glass-card p-6 border-b-4 border-b-gray-800">
                <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Impressions</p>
                <h2 class="text-3xl font-black mt-2" id="kpi-imps">0</h2>
            </div>
            <div class="glass-card p-6 border-b-4 border-b-[#E50914]">
                <p class="text-[#E50914] text-[10px] font-bold uppercase tracking-widest">Clicks</p>
                <h2 class="text-3xl font-black mt-2" id="kpi-clicks">0</h2>
            </div>
            <div class="glass-card p-6 border-b-4 border-b-gray-800">
                <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Avg CTR</p>
                <h2 class="text-3xl font-black mt-2" id="kpi-ctr">0.00%</h2>
            </div>
            <div class="glass-card p-6 border-b-4 border-b-gray-800">
                <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Viewable</p>
                <h2 class="text-3xl font-black mt-2" id="kpi-view">0</h2>
            </div>
        </div>

        <div class="glass-card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left prime-table">
                    <thead>
                        <tr><th>Line Item</th><th>Country</th><th>Impressions</th><th>Clicks</th><th>CTR</th><th>Viewable</th><th>Network ID</th></tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const REPORT_DATA_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQV17KMJNGsSBUjBAEXS80WE_E4M3n3g1dY0MkwfTgbfQphWe2gZ_20FB0rBJgnZMz1XlVm4n-9JSqX/pub?gid=1552157413&single=true&output=csv';
        const NETWORKS_LIST_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQV17KMJNGsSBUjBAEXS80WE_E4M3n3g1dY0MkwfTgbfQphWe2gZ_20FB0rBJgnZMz1XlVm4n-9JSqX/pub?gid=1570899718&single=true&output=csv';
        
        let rawReportData = [];

        async function init() {
            try {
                // 1. Fetch Network IDs
                const netRes = await fetch(NETWORKS_LIST_URL + '&cb=' + Date.now());
                const netText = await netRes.text();
                // We use trim() and replace quotes to clean the ID list
                const networkIds = netText.split('\n')
                    .map(id => id.replace(/"/g, '').trim())
                    .filter(id => id && id !== "Network ID" && id.length > 5);
                
                const selector = document.getElementById('networkFilter');
                networkIds.forEach(id => {
                    let opt = document.createElement('option');
                    opt.value = id;
                    opt.innerText = "Network: " + id;
                    selector.appendChild(opt);
                });

                // 2. Fetch Report Data
                const reportRes = await fetch(REPORT_DATA_URL + '&cb=' + Date.now());
                const reportText = await reportRes.text();
                const lines = reportText.split('\n');
                
                document.getElementById('last-updated').innerText = lines[0].replace(/"/g, '');
                
                rawReportData = lines.slice(2).map(row => {
                    const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                    if(!c[0] || c[0] === "Line Item") return null;
                    
                    return { 
                        item: c[0], 
                        geo: c[1], 
                        imps: parseInt(c[2])||0, 
                        clicks: parseInt(c[3])||0, 
                        ctr: c[4], 
                        view: parseInt(c[5])||0, 
                        // Critical: Clean the network ID in the data too
                        net: c[6] ? c[6].replace(/'/g, '').trim() : "" 
                    };
                }).filter(r => r !== null);

                applyFilters();
            } catch (e) {
                console.error("Dashboard Error:", e);
            } finally {
                document.getElementById('loader').style.display='none';
                document.getElementById('main-content').classList.remove('opacity-0');
            }
        }

        function applyFilters() {
            const selectedNet = document.getElementById('networkFilter').value.trim();
            console.log("Filtering for ID:", selectedNet);
            
            let filtered;
            if (selectedNet === 'all') {
                filtered = rawReportData;
            } else {
                // We use a flexible match to ensure ID strings align
                filtered = rawReportData.filter(r => r.net == selectedNet);
            }
            
            render(filtered);
        }

        function render(data) {
            let imps = 0, clks = 0, views = 0, html = "";
            
            if (data.length === 0) {
                html = `<tr><td colspan="7" class="text-center py-10 text-gray-500 italic">No data found for this Network ID today.</td></tr>`;
            } else {
                data.forEach((r) => {
                    imps += r.imps; clks += r.clicks; views += r.view;
                    html += `<tr class="hover:bg-[#1a1a1a]">
                        <td class="font-bold text-white">${r.item}</td>
                        <td>${r.geo}</td>
                        <td>${r.imps.toLocaleString()}</td>
                        <td>${r.clicks.toLocaleString()}</td>
                        <td class="text-[#E50914] font-bold">${r.ctr}</td>
                        <td>${r.view.toLocaleString()}</td>
                        <td class="text-gray-600 text-[10px] font-mono">${r.net}</td>
                    </tr>`;
                });
            }

            document.getElementById('kpi-imps').innerText = imps.toLocaleString();
            document.getElementById('kpi-clicks').innerText = clks.toLocaleString();
            document.getElementById('kpi-view').innerText = views.toLocaleString();
            document.getElementById('kpi-ctr').innerText = imps > 0 ? ((clks/imps)*100).toFixed(2) + '%' : '0.00%';
            document.getElementById('table-body').innerHTML = html;
        }

        init();
    </script>
</body>
</html>
